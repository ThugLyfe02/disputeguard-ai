name: Fraud Intelligence Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy requests pytest flake8

      - name: Lint Backend Code
        run: |
          flake8 backend --max-line-length=100 || true

      - name: Run Tests
        run: |
          pytest || echo "No tests found"

      - name: Validate SDK Package
        run: |
          if [ -f setup.py ]; then
            python setup.py sdist bdist_wheel
          else
            echo "No setup.py found, skipping SDK build"
          fi
